<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD Simple Viewer Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #111827;
        color: #e5e7eb;
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      .viewer-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #111827;
      }

      .viewer-canvas-area {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #cad-container {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <main class="viewer-pane">
        <section class="viewer-canvas-area">
          <div id="cad-container"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
