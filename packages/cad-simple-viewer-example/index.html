<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD Simple Viewer Example</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .toolbar-container {
        z-index: 1000;
        position: absolute;
        bottom: 20px;
        left: 20vw;
        width: 60vw;
        height: 48px;
        background: #0b1220;
        border-bottom: 1px solid #1f2937;
        padding: 0 0.75rem;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #111827;
        color: #e5e7eb;
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      .viewer-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: #111827;
      }

      .viewer-canvas-area {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #cad-container {
        position: absolute;
        inset: 0;
      }

      @media (max-width: 960px) {
        .app-shell {
          flex-direction: column;
        }

        .file-sidebar {
          flex: 0 0 auto;
          max-width: none;
          min-width: 0;
          height: 35%;
          border-right: none;
          border-bottom: 1px solid #1f2937;
        }

        .viewer-pane {
          height: 65%;
        }
      }
    </style>
  </head>
